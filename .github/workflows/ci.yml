name: CI

on:
  workflow_call:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/winarchive-tools-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" ./cmd/winarchive-tools

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: winarchive-tools-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/winarchive-tools-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
