name: Publish Release Assets

on:
  release:
    types:
      - created

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  publish-release-assets:
    name: Upload release assets
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          ASSETS=(
            dist/winarchive-tools-linux-amd64
            dist/winarchive-tools-linux-arm64
            dist/winarchive-tools-darwin-amd64
            dist/winarchive-tools-darwin-arm64
            dist/winarchive-tools-windows-amd64.exe
            dist/winarchive-tools-windows-arm64.exe
          )

          gh release upload "$TAG" --repo "$GH_REPO" "${ASSETS[@]}" --clobber
